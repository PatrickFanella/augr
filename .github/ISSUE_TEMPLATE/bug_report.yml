name: Bug report
description: Report a bug with clear reproduction steps and expected behavior.
title: "bug: "
labels:
  - type: bug
body:
  - type: input
    id: issue_title
    attributes:
      label: Title
      description: A short, specific title for this bug.
      placeholder: "bug: concise summary"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug, impact, and context.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: List exact steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Define clear, testable criteria for resolution.
      placeholder: |
        - [ ] Bug no longer reproduces with listed steps
        - [ ] Regression test or validation added where applicable
    validations:
      required: true
